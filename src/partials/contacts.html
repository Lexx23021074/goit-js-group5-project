<section id="contacts" class="contacts">
  <div class="container">
    <div class="contacts-container">
      <div class="contacts-info-wrapper">
        <svg class="icon" width="300" height="20">
          <use href="./img/sprite.svg#decore"></use>
        </svg>
        <h2 class="contacts-title">Let's Tell Your Story</h2>
        <p class="contacts-text">
          I can't wait to hear more about your wedding! Tell me about your
          plans, and I'll be in touch to discuss how we can create magic
          together.
        </p>
        <div class="contacts-wrapper">
          <div class="contacts-info-item">
            <svg class="contacts-icon" width="24" height="24">
              <use href="./img/sprite.svg#email"></use>
            </svg>
            <p class="contacts-info">
              <a href="mailto:info@mariakovalenko.com"
                >info@mariakovalenko.com</a
              >
            </p>
          </div>
          <div class="contacts-info-item">
            <svg class="contacts-icon" width="24" height="24">
              <use href="./img/sprite.svg#tel"></use>
            </svg>
            <p class="contacts-info">
              <a href="tel:+405551234567">+40 (555) 123-4567</a>
            </p>
          </div>
          <div class="contacts-info-item">
            <svg class="contacts-icon" width="24" height="24">
              <use href="./img/sprite.svg#address"></use>
            </svg>
            <p class="contacts-info">123 Main Street, Anytown, USA</p>
          </div>
        </div>
      </div>
      <div class="contacts-form-wrapper">
        <form class="contacts-form" aria-label="contacts form">
          <label class="contacts-form-label">
            Name*
            <input
              class="contacts-input"
              type="text"
              name="name"
              id="name"
              pattern=".{2,}"
              required
              placeholder="Maria"
            />
          </label>
          <label class="contacts-form-label">
            Phone*
            <input
              class="contacts-input"
              type="tel"
              name="phone"
              id="phone"
              pattern="[\d\s\+\-\(\)]+"
              required
              placeholder="+380000000000"
            />
          </label>
          <label class="contacts-form-label">
            Message
            <textarea
              class="contacts-textarea"
              name="comment"
              id="comment"
              placeholder="Tell me a little about you and your special day. Don't forget to include your wedding date, venue, and what you're most excited about..."
            ></textarea>
          </label>
          <button class="contacts-button" type="submit">Let's Talk</button>
        </form>
      </div>
    </div>
  </div>
</section>
